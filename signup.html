<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <header>
        <table width="100%" border="0">
            <tr>
                <td align="left">
                    <h1> <sup>Book Corner</sup> </h1>
                </td>
                <td align="left">
                    <nav width="60%">
                        <pre><a  href="home.html"><font size="5">Home</font></a>  <a href="signup.html"><font size="5">Sign up</font></a>  <a href="login.html"><font size="5">Log in</font></a>                                                                                  
                </pre>
                    </nav>
                    <hr>
                </td>
            </tr>
        </table>
    </header>

    <section>
        <h2>Create a new account</h2>

        <form action="#" method="post">
            <p>
                <label for="username">Username <span>*</span></label><br>
                <input type="text" id="username" name="username" required>
            </p>

            <p>
                <label for="email">Email address</label><br>
                <input type="email" id="email" name="email">
            </p>

            <p>
                <label for="password">Password <span>*</span></label><br>
                <input type="password" id="password" name="password" required>
            </p>

            <p>
                <label for="confirm-password">Confirm password <span>*</span></label><br>
                <input type="password" id="confirm-password" name="confirm_password" required>
            </p>

            <fieldset>
                <legend>Account type</legend>
                <p>
                    <input type="radio" id="role-admin" name="role" value="admin">
                    <label for="role-admin">Admin</label>
                </p>
                <p>
                    <input type="radio" id="role-user" name="role" value="user" checked>
                    <label for="role-user">User</label>
                </p>
            </fieldset>

            <p>
                <button type="submit">Sign up</button>
            </p>
        </form>

        <p>Already have an account? <a href="login.html">Log in</a></p>
    </section>

    <footer>
        <hr>
        <p>© 2025 Online Library </p>
    </footer>
</body>
</html>
