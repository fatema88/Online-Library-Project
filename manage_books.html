<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Books</title>
    <link rel="stylesheet" href="manage_books.css">
    <script src="manage_books.js"></script>
</head>
<body>
    
    <header>
        <table width="100%" border="0">
            <tr>
                <td align="left">
                    <h1> <sup>Book Corner</sup> </h1>
                </td>
                <td align="right">
                    <nav>
                        <pre><a  href="home.html"><font size="5">Home</font></a>     <a href="add_edit_book.html"><font size="5">Add Book</font></a>     <a href="manage_books.html"><font size="5">Manage Books</font></a>     <a href="login.html"><font size="5">Logout</font></a>                                                    
                        </pre>
                    </nav>
                    <hr>
                </td>
            </tr>
        </table>
    </header>

    <section>
        <h2>Manage Books</h2>

        <div id="filterContainer">
            <label>Filter by Name:</label>
            <input type="text" id="filterName" placeholder="Search book name...">
            <label>Filter by Author:</label>
            <input type="text" id="filterAuthor" placeholder="Search author...">
            <label>Filter by Category:</label>
            <input type="text" id="filterCategory" placeholder="Search category...">
        </div>

        <table border="3" cellpadding="5" id="booksTable">
        <caption><b>Library Books List</b></caption>
            <thead>
                <tr>
                    <th class="sortable">Book ID</th>
                    <th class="sortable">Book Name</th>
                    <th class="sortable">Author</th>
                    <th class="sortable">Category</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
            </tbody>
        </table>
    </section>

         <br>
    <footer >
    <hr>
        <p>© 2026 Book Corner </p>
    </footer>
</body>
</html>
