<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Corner - Add Book</title>
    <link rel="stylesheet" href="css/add_edit_book.css">
    <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong"> -->

</head>

<body>

    <nav>
        <div class="logo">
            <h1> Book Corner </h1>
        </div>
        <ul class="navLinks">
            <li><a href="home.html">Home</a></li>
            <li><a href="add_edit_book.html" class="active">Add Book</a></li>
            <li><a href="manage_books.html">Manage Books</a></li>
            <li><a href="login.html" class="logout">Logout</a></li>
        </ul>
    </nav>

    <main>
        <div class="header">
            <h2 class="Title">Add Book</h2>
        </div>
        <div class="content">
            <div class="form-card">
                <form action="" method="post">
                    <div class="form-cards">

                        <div class="field">
                            <label for="bookName">Book Name:</label>
                            <input type="text" id="bookName" name="bookName" required>
                        </div>

                        <div class="field">
                            <label for="author">Author:</label>
                            <input type="text" id="author" name="author" required>
                        </div>

                        <div class="field">
                            <label for="category">Category: </label>
                            <div class="C-select"></div>
                            <select id="category" name="category">
                                <option value="">Select a category</option>
                                <option>Fiction</option>
                                <option>History</option>
                                <option>Science</option>
                                <option>Technology</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label for="bookID">Book ID:</label>
                        <input type="number" id="bookID" name="bookId" required>
                    </div>

                    <div class="field full">
                        <label for="description">Description:</label>
                        <textarea id="description" name="description" rows="6" cols="40"></textarea>
                    </div>
                    <div class="actions">
                        <button class="btn-save" type="submit">Save Book</button>
                        <button class="btn-clear" type="button" id="clearBtn">Clear Form</button>
                    </div>
                </form>
            </div>
            <div class="image">
                <img src="book1.png">
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Book Corner </p>
    </footer>
    <script src="js/add_edit_book.js"></script>
</body>

</html>
