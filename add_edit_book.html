<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add/Edit book</title>
</head>
<body>
    <header>
        <table width="100%" border="0">
            <tr>
                <td align="left">
                    <h1> <sup>Book Corner</sup> </h1>
                </td>
                <td align="left">
                    <nav width="60%">
                        <pre><a  href="home.html"><font size="5">Home</font></a>  <a href="add_edit_book.html"><font size="5">Add Book</font></a>  <a href="manage_books.html"><font size="5">Manage Books</font></a>  <a href="login.html"><font size="5">Logout</font></a>                                                              
                </pre>
                    </nav>
                    <hr>
                </td>
            </tr>
        </table>
    </header>

    <h2>Add / Edit Book</h2>

    <form action="" method="post">

        <label for="bookName">Book Name:</label>
        <input type="text" id="bookName" for="bookName" required>
        <br><br>

        <label for="author">Author:</label>
        <input type="text" id="author" name="author" required>
        <br><br>

        <label for="category">Category: </label>
        <select id="category" name="Category">
            <option></option>
            <option>Fiction</option>
            <option>History</option>
            <option>Science</option>
            <option>Technology</option>
        </select>
        <br><br>

        <label for="bookID">Book ID:</label>
        <input type="number" id="bookID" name="bookId" required>
        <br><br>



        <label for="description">Description:</label>
        <br>
        <textarea id="description" name="description" rows="9" cols="40"></textarea>
        <br><br>

        <button type="submit">Save Book</button>
        <button type="reset">Clear Form</button>


    </form>

    
</body>
</html>
