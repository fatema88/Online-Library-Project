<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>


    <header>
        <h1 class="logo">Book Corner</h1>
        <nav class="nav">
            <a href="home.html">Home</a>
            <a href="signup.html">Sign Up</a>
            <a href="login.html">Log In</a>
        </nav>

    </header>


<div class="login">
    <div class="form-box">
        <h3>Welcome Back</h3>
        <form id="loginForm">
            <div class="input-box">
            <label for="name">Email</label>
            <input type ="Email" id="email" name ="email" placeholder="enter your email"required >
        </div>


        <div class="input-box">
            <label for ="pass">password</label>
            <input type="password" id="pass" name ="pass" minlength="7" maxlength="12" placeholder="enter your password" required>
        </div>
        <div class="remember-forgot">
            <label><input type="checkbox">Remember me</label>
            <a href="signup.html">Forgot Password?</a>
        </div>
        <button type="submit" class="btn">Submit</button>
        <div class="account">
            <p>Don't have an account?<a href="signup.html" class="link">Sign up</a></p>
        </div>
        </form>
    </div>
</div>




<footer>
    <div class="footer-content">
        <p>&copy; 2026 Book Corner. All rights reserved.</p>
    </div>
</footer>
        

<script src="js/login.js"></script>
</body>
</html>
