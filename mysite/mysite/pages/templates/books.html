<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Books</title>

{% load static %}

<!-- css file -->
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<header>
    <h1 class="logo">Book Corner</h1>

    <nav class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'books' %}">Books</a>
        <a href="{% url 'search' %}">Search</a>
        <a href="{% url 'borrowed_books' %}">Borrowed Books</a>
        <a href="{% url 'login' %}">Logout</a>
    </nav>
</header>

<div class="books">

<h2>Books List</h2>

<table>

<tr>
<th>Book Name</th>
<th>Author</th>
<th>Status</th>
<th>Details</th>
</tr>

<!-- loop through all books -->
{% for book in books %}

<tr>

<!-- display book name -->
<td>{{ book.name }}</td>

<!-- display author -->
<td>{{ book.author }}</td>

<!-- check availability -->
<td>
{% if book.available %}
Available
{% else %}
Not Available
{% endif %}
</td>

<!-- details page -->
<td>
<a href="{% url 'book_details' book.id %}">Details</a>
</td>

</tr>

{% endfor %}

</table>

</div>

<br>

<footer>
<hr>
<p>© 2026 Book Corner</p>
</footer>

<!-- js file -->
<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
