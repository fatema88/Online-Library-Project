{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Books List</title>
    <link rel="stylesheet" href="{% static 'books/css/style.css' %}">
</head>

<body>

<header>
    <h1 class="logo">Book Corner</h1>
    <nav class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'books' %}">Books</a>
        <a href="{% url 'search' %}">Search</a>
        <a href="{% url 'borrowed_books' %}">Borrowed Books</a>
        <a href="{% url 'login' %}">Logout</a>
    </nav>
</header>

<div class="books">
    <h2>Books List</h2>

    <!-- رسالة النجاح أو الخطأ -->
    <div id="message" style="display:none; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold;"></div>

    <table>
        <thead>
            <tr>
                <th>Book Name</th>
                <th>Author</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.category }}</td>
                <td>
                    <button 
                        class="borrow-btn" 
                        data-book-id="{{ book.id }}"
                        data-book-title="{{ book.title }}"
                    >
                        Borrow Now
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center;">No books available right now.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<footer>
    <hr>
    <p>© 2026 Book Corner</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const messageBox = document.getElementById("message");

    function showMessage(text, isSuccess) {
        messageBox.textContent = text;
        messageBox.style.display = "block";
        messageBox.style.backgroundColor = isSuccess ? "#d4edda" : "#f8d7da";
        messageBox.style.color = isSuccess ? "#155724" : "#721c24";

        setTimeout(() => {
            messageBox.style.display = "none";
        }, 3000);
    }

    document.querySelectorAll(".borrow-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
            const bookId = btn.dataset.bookId;
            const bookTitle = btn.dataset.bookTitle;

            fetch(`/borrow/${bookId}/`, {
                method: "GET",
                headers: {
                    "x-requested-with": "XMLHttpRequest"
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "ok") {
                    showMessage(`✅ You borrowed "${bookTitle}" successfully!`, true);
                    btn.disabled = true;
                    btn.textContent = "Borrowed ✓";
                    btn.style.backgroundColor = "#aaa";
                } else if (data.status === "already") {
                    showMessage(`⚠️ You already borrowed "${bookTitle}"!`, false);
                } else {
                    showMessage("Something went wrong, please try again.", false);
                }
            })
            .catch(error => {
                console.error("Error:", error);
                showMessage("Connection error, please try again.", false);
            });
        });
    });
});
</script>

</body>
</html>
