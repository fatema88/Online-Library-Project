{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Books</title>
    <link rel="stylesheet" href="{% static 'books/css/search.css' %}">
    <script src="{% static 'books/js/search.js' %}"></script>
</head>

<body>

<header>
    <h1 class="logo">Book Corner</h1>
    <nav class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="/books/">Books</a>
        <a href="{% url 'search' %}">Search</a>
        <a href="{% url 'borrowed_books' %}">Borrowed Books</a>
        <a href="{% url 'login' %}">Logout</a>
    </nav>
</header>

<section>
    <h2>Search for a Book</h2>

    <!-- AJAX Search Form -->
    <form id="searchForm" onsubmit="return false;">
        <label>Search by Title or Author:</label>
        <input 
            type="text" 
            id="searchInput" 
            placeholder="Enter book title or author..."
            autocomplete="off"
        >
    </form>

    <div id="resultsContainer" class="books-container">
        <p>Start typing to search for books...</p>
    </div>
</section>

<footer>
    <hr>
    <p>© 2026 Book Corner</p>
</footer>



</body>
</html>
