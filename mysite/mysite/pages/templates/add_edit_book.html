{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if book %}Edit Book{% else %}Add Book{% endif %}</title>

    <link rel="stylesheet" href="{% static 'books/css/add_edit_book.css' %}">
</head>

<body>

    <nav>
        <div class="logo">
            <h1> Book Corner </h1>
        </div>
        <ul class="navLinks">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'add_book' %}" class="active">Add Book</a></li>
            <li><a href="{% url 'manage_books' %}">Manage Books</a></li>
            <li><a href="login.html" class="logout">Logout</a></li>
        </ul>
    </nav>

    <main>
        <div class="header">
            <h2 class="Title">{% if book %} Edit Book {% else %} Add Book {% endif %}</h2>
        </div>
        <div class="content">
            <div class="form-card">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-cards">

                        <div class="field">
                            <label for="bookName">Book Name:</label>
                            <input type="text" id="bookName" name="bookName" value="{{ book.title|default:'' }}" required>
                        </div>

                        <div class="field">
                            <label for="author">Author:</label>
                            <input type="text" id="author" name="author" value="{{ book.author|default:'' }}" required>
                        </div>

                        <div class="field">
                            <label for="category">Category: </label>
                            <div class="C-select"></div>
                            <select id="category" name="category">
                                <option value="">Select</option>

                                <option value="Fiction" {% if book.category == "Fiction" %}selected{% endif %}>Fiction</option>
                                <option value="History" {% if book.category == "History" %}selected{% endif %}>History</option>
                                <option value="Science" {% if book.category == "Science" %}selected{% endif %}>Science</option>
                                <option value="Technology" {% if book.category == "Technology" %}selected{% endif %}>Technology</option>
                                <option value="Self-Help" {% if book.category == "Self-Help" %}selected{% endif %}>Self-Help</option>
                            </select>
                        </div>
                    </div>

                    <!-- <div class="field">
                        <label for="bookID">Book ID:</label>
                        <input type="number" id="bookID" name="bookId" required>
                    </div> -->

                    <div class="field full">
                        <label for="description">Description:</label>
                        <textarea id="description" name="description" rows="6" cols="40">{{ book.description|default:'' }}</textarea>
                    </div>
                    <div class="actions">
                        <button class="btn-save" type="submit">Save Book</button>
                        <button class="btn-clear" type="button" id="clearBtn">Clear Form</button>
                    </div>
                </form>
            </div>
            <div class="image">
                <img src="{% static 'books/images/book1.png' %}">
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Book Corner </p>
    </footer>
    <script src="{% static 'books/js/add_edit_book.js' %}"></script>
</body>

</html>
